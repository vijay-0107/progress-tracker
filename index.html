<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study Progress Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="app.js"></script>
  </head>
  <body>
      <header class="app-header">
        <button class="icon-button menu-button" id="openNav" type="button" aria-label="Open navigation">Menu</button>
        <a class="brand" href="#/home" aria-label="Progress Tracker home">
          <span class="brand-mark">PT</span>
          <span>
            <strong>Progress Tracker</strong>
            <small id="generatedLabel">Loading data</small>
          </span>
        </a>
        <nav class="desktop-nav" aria-label="Primary navigation">
          <a href="#/home" data-nav="home">Home</a>
          <a href="#/plan" data-nav="plan">Plan</a>
          <a href="#/schedule/Career%20Study%20Plan" data-nav="Career Study Plan">Career</a>
          <a href="#/schedule/CAT%202026%20Prep" data-nav="CAT 2026 Prep">CAT</a>
          <a href="#/analytics" data-nav="analytics">Analytics</a>
          <a href="#/calendar" data-nav="calendar">Calendar</a>
        </nav>
        <div class="header-actions">
          <button class="ghost-button account-button" id="accountButton" type="button">Sign in</button>
          <button class="ghost-button" id="jumpNext" type="button">Next incomplete</button>
          <button class="solid-button" id="exportProgress" type="button">Export</button>
        </div>
      </header>

      <aside class="mobile-drawer" id="mobileDrawer" aria-hidden="true">
        <div class="drawer-panel">
          <div class="drawer-heading">
            <span class="brand-mark">PT</span>
            <button class="icon-button" id="closeNav" type="button" aria-label="Close navigation">Close</button>
          </div>
          <nav class="drawer-nav" aria-label="Mobile navigation">
            <a href="#/home" data-nav="home">Home</a>
            <a href="#/plan" data-nav="plan">Plan</a>
            <a href="#/schedule/Career%20Study%20Plan" data-nav="Career Study Plan">Career Study Plan</a>
            <a href="#/schedule/CAT%202026%20Prep" data-nav="CAT 2026 Prep">CAT 2026 Prep</a>
            <a href="#/analytics" data-nav="analytics">Analytics</a>
            <a href="#/calendar" data-nav="calendar">Calendar</a>
          </nav>
          <button class="ghost-button full-width" id="drawerAccount" type="button">Sign in</button>
          <button class="ghost-button full-width" id="drawerJumpNext" type="button">Next incomplete</button>
          <button class="solid-button full-width" id="drawerExport" type="button">Export progress</button>
        </div>
      </aside>

      <main class="app-shell">
        <section class="summary-strip" aria-label="Progress summary">
          <article class="overall-card">
            <span class="panel-label">Overall progress</span>
            <strong id="overallPercent">0%</strong>
            <div class="meter large" aria-hidden="true"><span id="overallBar"></span></div>
            <p id="overallSubtitle">0 of 0 days complete</p>
          </article>
          <article class="mini-stat">
            <span>Total topics</span>
            <strong id="totalTopics">0</strong>
          </article>
          <article class="mini-stat">
            <span>Completed</span>
            <strong id="completedDays">0</strong>
          </article>
          <article class="mini-stat">
            <span>Remaining</span>
            <strong id="remainingDays">0</strong>
          </article>
        </section>

        <section id="app" class="route-view" aria-live="polite">
          <div class="loading-panel">
            <h1>Loading tracker</h1>
            <p>Preparing your schedules.</p>
          </div>
        </section>
      </main>

      <div class="modal-backdrop" id="dayModal" hidden>
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <button class="icon-button modal-close" id="closeModal" type="button" aria-label="Close details">Close</button>
          <div id="modalContent"></div>
        </section>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
