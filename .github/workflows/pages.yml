name: Deploy static tracker to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build Firebase config from repository secrets
        shell: bash
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          required = ["FIREBASE_API_KEY", "FIREBASE_AUTH_DOMAIN", "FIREBASE_PROJECT_ID", "FIREBASE_APP_ID"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print(f"::error::Missing required Firebase repository secrets: {', '.join(missing)}")
              sys.exit(1)

          config = {
              "apiKey": os.environ["FIREBASE_API_KEY"],
              "authDomain": os.environ["FIREBASE_AUTH_DOMAIN"],
              "projectId": os.environ["FIREBASE_PROJECT_ID"],
              "storageBucket": os.environ.get("FIREBASE_STORAGE_BUCKET", ""),
              "messagingSenderId": os.environ.get("FIREBASE_MESSAGING_SENDER_ID", ""),
              "appId": os.environ["FIREBASE_APP_ID"],
              "measurementId": os.environ.get("FIREBASE_MEASUREMENT_ID", ""),
          }

          with open("firebase-config.js", "w", encoding="utf-8") as config_file:
              config_file.write("export const firebaseConfig = ")
              json.dump(config, config_file, indent=2)
              config_file.write(";\n")
          PY
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
